name: Automated Benchmark
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with: 
          python-version: '3.9'

      - name: Install dependencies
        run: pip install numpy matplotlib networkx
      - name: Run Benchmark
        run: python $GITHUB_WORKSPACE/benchmark/Resonance_Emulator.py

      - name: Commit Results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Add both the image and the data log
          git add benchmark_results.png benchmark_data.json
          # Commit only if there are changes to avoid error if nothing changed
          git commit -m "Update benchmark metrics and data logs" || echo "No changes to commit"
          git push
          
