name: Automated Benchmark
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: DISCOVER FILE STRUCTURE
        run: |
          echo "--- Current Directory Contents ---"
          ls -R
          echo "----------------------------------"

      - name: Run Benchmark
        run: |
          # The find command will now succeed because we know exactly where it is
          SCRIPT_PATH=$(find . -name "Resonance_Emulator.py")
          python "$SCRIPT_PATH"
          
