      - name: Run Benchmark
        run: |
          # Find the file, ensuring it is a file (-type f) and not a directory
          SCRIPT_PATH=$(find . -name "Resonance_Emulator.py" -type f | head -n 1)
          
          if [ -z "$SCRIPT_PATH" ]; then
            echo "Error: Resonance_Emulator.py not found!"
            exit 1
          fi
          
          echo "Executing script at: $SCRIPT_PATH"
          python "$SCRIPT_PATH"
          
